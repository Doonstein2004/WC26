<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copa do Mundo 2026</title>
  <link rel="stylesheet" href="/flag-icons/css/flag-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="header">
    <div class="header-brand">
      <span class="trophy">&#9733;</span>
      <div>
        <div class="title">FIFA Copa do Mundo 2026</div>
        <div class="subtitle">EUA &middot; Canad&aacute; &middot; M&eacute;xico</div>
      </div>
    </div>

    <div class="header-center" id="headerCenter">
      <!-- badge ao vivo / modo atual -->
    </div>

    <div class="header-clock">
      <div class="clock" id="clock"></div>
      <div class="date"  id="date"></div>
    </div>
  </header>

  <main class="stage" id="stage">
    <div class="splash">
      <div class="splash-text">Carregando partidas...</div>
    </div>
  </main>

  <footer class="ticker-bar">
    <div class="ticker-label" id="tickerLabel">PLACAR</div>
    <div class="ticker-wrap">
      <div class="ticker-content" id="ticker"></div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
